name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - name: minimal
            langs: "[]"
            features: "--data proto=false --data oci=false"
          - name: js
            langs: "[javascript]"
            features: "--data proto=false --data oci=false"
          - name: py
            langs: "[python]"
            features: "--data proto=false --data oci=false"
          - name: go
            langs: "[go]"
            features: "--data proto=false --data oci=true"
          - name: java
            langs: "[java]"
            features: "--data proto=true --data oci=false"
          - name: kotlin
            langs: "[kotlin]"
            features: "--data proto=false --data oci=false"
          - name: rust
            langs: "[rust]"
            features: "--data proto=false --data oci=false"
          - name: ruby
            langs: "[ruby]"
            features: "--data proto=true --data oci=false"
          - name: shell
            langs: "[shell]"
            features: "--data proto=false --data oci=false"
          - name: kitchen-sink
            langs: "[javascript, python, go, java, scala, kotlin, cpp, rust, ruby, shell]"
            features: "--data proto=false --data oci=true"
          - name: cpp
            langs: "[cpp]"
            features: "--data proto=false --data oci=false"
          - name: scala
            langs: "[scala]"
            features: "--data proto=false --data oci=false"

    name: "test (${{ matrix.preset.name }})"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install copier
        run: pip install copier

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          repository-cache: true
          bazelrc: |
            common --announce_rc --color=yes --curses=yes
            common --show_progress_rate_limit=60 --show_timestamps

      - name: Install direnv
        run: |
          sudo apt-get install -y direnv
          eval "$(direnv hook bash)"

      - name: Run preset validation
        run: ./scripts/ci/run-preset.sh "${{ matrix.preset.name }}" "${{ matrix.preset.langs }}" "${{ matrix.preset.features }}"

  # For branch protection settings, this job provides a "stable" name that can be used to gate PR merges
  # on "all matrix jobs were successful".
  conclusion:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: technote-space/workflow-conclusion-action@45ce8e0eb155657ab8ccf346ade734257fd196a5 # v3.0.3

      - name: report success
        if: ${{ env.WORKFLOW_CONCLUSION == 'success' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 0

      - name: report failure
        if: ${{ env.WORKFLOW_CONCLUSION == 'failure' }}
        working-directory: /tmp
        run: echo ${{ env.WORKFLOW_CONCLUSION }} && exit 1
